<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collectorly — Reset Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
<div id="login-overlay">
  <div class="login-box">
    <div class="logo-title"><i class="bi bi-gem me-2"></i>Collectorly</div>
    <div class="logo-sub">Set New Password</div>

    {% if not valid %}
    <!-- Invalid / expired token ── -->
    <div class="alert alert-danger py-2 small mb-3">
      <i class="bi bi-x-circle me-1"></i>
      This reset link is <strong>invalid or has expired</strong>. Reset links are valid for 1 hour.
    </div>
    <div class="d-grid mb-3">
      <a href="/forgot-password" class="btn btn-primary">
        <i class="bi bi-envelope me-1"></i>Request a new link
      </a>
    </div>

    {% else %}
    <!-- Valid token ── -->
    <div id="rp-success" class="alert alert-success d-none py-2 small">
      <i class="bi bi-check-circle me-1"></i>
      Password updated! Redirecting to sign in…
    </div>
    <div id="rp-error" class="alert alert-danger d-none py-2 small"></div>

    <form id="rp-form" onsubmit="doReset(event)">
      <div class="mb-3">
        <label class="form-label fw-semibold">New Password</label>
        <div class="input-group">
          <input type="password" id="rp-pw" class="form-control" autofocus
                 placeholder="Min 8 characters" autocomplete="new-password">
          <button type="button" class="btn btn-outline-secondary" onclick="toggleVis('rp-pw','eye1')">
            <i class="bi bi-eye" id="eye1"></i>
          </button>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Confirm New Password</label>
        <div class="input-group">
          <input type="password" id="rp-confirm" class="form-control"
                 placeholder="Repeat password" autocomplete="new-password">
          <button type="button" class="btn btn-outline-secondary" onclick="toggleVis('rp-confirm','eye2')">
            <i class="bi bi-eye" id="eye2"></i>
          </button>
        </div>
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-primary" id="btn-rp">
          <span id="rp-spinner" class="spinner-border spinner-border-sm me-2 d-none"></span>
          <i class="bi bi-shield-lock me-1"></i>Set New Password
        </button>
      </div>
    </form>
    {% endif %}

    <div class="text-center mt-3">
      <a href="/login" class="text-muted small"><i class="bi bi-arrow-left me-1"></i>Back to sign in</a>
    </div>
  </div>
</div>

<script>
  const TOKEN = {{ token | tojson }};

  function toggleVis(inputId, iconId) {
    const inp  = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (inp.type === 'password') { inp.type = 'text'; icon.className = 'bi bi-eye-slash'; }
    else                         { inp.type = 'password'; icon.className = 'bi bi-eye'; }
  }

  async function doReset(e) {
    e.preventDefault();
    const pw      = document.getElementById('rp-pw').value;
    const confirm = document.getElementById('rp-confirm').value;
    const btn     = document.getElementById('btn-rp');
    const spinner = document.getElementById('rp-spinner');
    const errEl   = document.getElementById('rp-error');
    const sucEl   = document.getElementById('rp-success');

    errEl.classList.add('d-none');

    if (pw.length < 8)     { showErr('Password must be at least 8 characters.'); return; }
    if (pw !== confirm)    { showErr('Passwords do not match.'); return; }

    btn.disabled = true;
    spinner.classList.remove('d-none');

    try {
      const res  = await fetch('/api/auth/reset-password', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ token: TOKEN, password: pw, confirm }),
      });
      const data = await res.json();
      if (res.ok) {
        sucEl.classList.remove('d-none');
        document.getElementById('rp-form').classList.add('d-none');
        setTimeout(() => { window.location.href = '/login'; }, 2000);
      } else {
        showErr(data.error || 'Reset failed.');
        btn.disabled = false;
        spinner.classList.add('d-none');
      }
    } catch (ex) {
      showErr('Network error. Please try again.');
      btn.disabled = false;
      spinner.classList.add('d-none');
    }
  }

  function showErr(msg) {
    const el = document.getElementById('rp-error');
    el.textContent = msg;
    el.classList.remove('d-none');
  }
</script>
</body>
</html>
